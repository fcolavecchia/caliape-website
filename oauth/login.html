<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ingreso · Caliape para ChatGPT</title>
    <style>
      :root {
        --bg: #f4f8f6;
        --panel: #ffffff;
        --border: #d9e5de;
        --text: #123628;
        --muted: #5d7a6d;
        --primary: #1f3d28;
        --primary-strong: #17301f;
        --accent: #20c997;
        --accent-soft: #e8f8f3;
        --danger: #d92d20;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Nunito Sans", "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at top right,
          #f8fffb 0,
          var(--bg) 42%
        );
        color: var(--text);
      }
      /* ── login-main ── */
      .login-main {
        min-height: 100vh;
        margin-top: 0;
        padding: 32px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* ── login-shell ── */
      .login-shell {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(16, 41, 30, 0.08);
      }
      /* ── aside ── */
      .login-aside {
        padding: 38px 34px;
        background: linear-gradient(145deg, #17301f, #1f3d28 45%, #20c997 140%);
        color: #ffffff;
      }
      .login-logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #fff;
        padding: 6px;
      }
      .login-kicker {
        margin: 16px 0 6px;
        opacity: 0.9;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .login-aside h1 {
        margin: 0 0 10px;
        font-size: 32px;
        line-height: 1.12;
      }
      .login-copy {
        margin: 0;
        max-width: 36ch;
        opacity: 0.92;
      }
      /* ── connector badge (inside aside, below copy) ── */
      .connector-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 28px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.02em;
      }
      .connector-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #20c997;
        flex-shrink: 0;
        box-shadow: 0 0 0 2px rgba(32, 201, 151, 0.35);
      }
      /* ── form card ── */
      .login-card {
        padding: 32px 30px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .login-card h2 {
        margin: 2px 0 6px;
        font-size: 22px;
      }
      .login-card label {
        font-size: 13px;
        color: var(--muted);
        font-weight: 700;
      }
      .login-card input {
        width: 100%;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 11px;
        outline: none;
        font-size: 14px;
        color: var(--text);
        font-family: inherit;
      }
      .login-card input:focus {
        border-color: #8ccdb8;
        box-shadow: 0 0 0 3px rgba(32, 201, 151, 0.15);
      }
      button.primary {
        border: 0;
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
        font-weight: 700;
        font-family: inherit;
        font-size: 15px;
        background: var(--primary);
        color: #fff;
        margin-top: 6px;
      }
      button.primary:hover {
        background: var(--primary-strong);
      }
      button.primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .login-error {
        color: var(--danger);
        margin: 4px 0 0;
        font-size: 13px;
        display: none;
      }
      .login-error.show {
        display: block;
      }
      .scope-note {
        margin-top: 4px;
        font-size: 11.5px;
        color: var(--muted);
      }
      .scope-note code {
        background: var(--accent-soft);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
        color: var(--primary);
      }
      /* ── responsive ── */
      @media (max-width: 1023px) {
        .login-shell {
          grid-template-columns: 1fr;
        }
        .login-aside h1 {
          font-size: 28px;
        }
      }
      @media (max-width: 767px) {
        .login-main {
          padding: 14px;
        }
        .login-aside,
        .login-card {
          padding: 22px 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-main">
      <section class="login-shell">
        <!-- Left aside -->
        <aside class="login-aside">
          <img
            class="login-logo"
            src="https://app.caliape.com/caliape-logo.png"
            alt="Caliape"
          />
          <p class="login-kicker">Caliape GPT Preview App</p>
          <h1>Ingreso de profesionales</h1>
          <p class="login-copy">
            Accedé al workspace clínico para gestionar pacientes, consultas y
            validaciones con trazabilidad segura.
          </p>
          <!-- OpenAI / ChatGPT connection badge -->
          <div class="connector-badge">
            <!-- OpenAI logo mark -->
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.843-3.37 2.02-1.168a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.402-.68zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.392.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"
                fill="rgba(255,255,255,0.85)"
              />
            </svg>
            <span class="connector-dot"></span>
            Solicitud de acceso desde ChatGPT
          </div>
        </aside>

        <!-- Right form card -->
        <form class="login-card" id="form" method="post" action="">
          <!-- Hidden OAuth PKCE params -->
          <input type="hidden" id="f_client_id" name="client_id" />
          <input type="hidden" id="f_redirect_uri" name="redirect_uri" />
          <input type="hidden" id="f_state" name="state" />
          <input type="hidden" id="f_scope" name="scope" />
          <input type="hidden" id="f_code_challenge" name="code_challenge" />
          <input
            type="hidden"
            id="f_code_challenge_method"
            name="code_challenge_method"
          />
          <input type="hidden" id="f_resource" name="resource" />

          <h2>Autorizar acceso</h2>

          <div class="login-error" id="err"></div>

          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            required
            autocomplete="email"
            placeholder="doctor@ejemplo.com"
          />

          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          />

          <button class="primary" type="submit">
            Autorizar acceso a ChatGPT
          </button>

          <p class="scope-note">
            Permisos solicitados: <code id="sc">openid email profile</code>
          </p>
        </form>
      </section>
    </main>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);

        [
          "client_id",
          "redirect_uri",
          "state",
          "scope",
          "code_challenge",
          "code_challenge_method",
          "resource",
        ].forEach(function (k) {
          var el = document.getElementById("f_" + k);
          if (el) el.value = p.get(k) || "";
        });

        var sc = p.get("scope");
        if (sc) document.getElementById("sc").textContent = sc;

        var err = p.get("error");
        if (err) {
          var el = document.getElementById("err");
          el.textContent = decodeURIComponent(err.replace(/\+/g, " "));
          el.classList.add("show");
        }

        // Form action is hardcoded — this page is hosted on www.caliape.com (GitHub Pages),
        // a separate domain from the Supabase Edge Function.
        document.getElementById("form").action =
          "https://cjwyjqklzrufnbtnzxfa.supabase.co/functions/v1/mcp-caliape/oauth/authorize";
      })();
    </script>
  </body>
</html>
